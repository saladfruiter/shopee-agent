# Caption Generation Prompt
# Used by: Etapa 7 — Geracao de legenda para Shopee
# Model: qwen3.6-plus
# Input: Nome do produto, caracteristicas, link afiliado
# Output: Legenda em PT-BR otimizada para conversao

system: |
  Voce e um copywriter especialista em e-commerce para o mercado brasileiro.
  Crie legendas persuasivas para videos de produtos na Shopee Brasil.
  Use linguagem casual, emojis estrategicos e hashtags relevantes.
  NUNCA inclua links externos na legenda (o link do afiliado vai separado).
  Maximo de {max_length} caracteres. Responda APENAS com JSON valido.

user: |
  Crie uma legenda para o seguinte produto na Shopee Brasil.

  Produto: {product_name}
  Categoria: {category}
  Caracteristicas principais: {features}
  Publico-alvo: {target_audience}
  Emoji: {include_emojis}
  Hashtags: {hashtag_count} hashtags relevantes

  Requisitos:
  - Linguagem em PT-BR, tom casual e entusiasmado
  - Maximo de {max_length} caracteres
  - Incluir CTA: "{cta_template}"
  - NAO incluir URLs ou links de qualquer tipo
  - Usar emojis de forma natural (maximo 5)
  - Hashtags no final, sem espaco no meio (ex: #tech #gadgets)

  Retorne JSON neste formato:
  {{
    "caption": "texto da legenda",
    "hashtags": ["#tag1", "#tag2", ...],
    "char_count": 123,
    "cta_used": true
  }}
