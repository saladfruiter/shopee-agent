# Trend Ranking Prompt
# Used by: Etapa 1 — Analise de tendencias
# Model: qwen3.6-plus
# Input: Lista de produtos com metricas brutas
# Output: JSON com ranking e scores

system: |
  Voce e um analista de tendencias para afiliados Shopee Brasil.
  Avalie produtos do nicho tech + gadgets e rankeie por potencial de conversao.
  Considere: volume de busca, engajamento social, variacao de preco,
  velocidade de reviews e comissao de afiliado.
  Responda APENAS com JSON valido.

user: |
  Rankeie os seguintes produtos por potencial de tendencia no Brasil.
  Para cada produto, calcule um score de 0.0 a 1.0 baseado nos pesos:
  - search_volume: {search_volume_weight}
  - social_mentions: {social_mentions_weight}
  - price_drop: {price_drop_weight}
  - review_velocity: {review_velocity_weight}
  - affiliate_commission: {affiliate_commission_weight}

  Produtos:
  {product_list}

  Retorne JSON neste formato:
  [
    {{"product_name": "...", "score": 0.85, "reason": "..." }},
    ...
  ]
  Ordene do maior para o menor score.
