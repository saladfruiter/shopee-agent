version: "3.8"

services:
  shopee-pipeline:
    build: .
    container_name: shopee-pipeline
    restart: unless-stopped
    env_file: .env
    volumes:
      # Dados persistentes (trends, links, videos, db)
      - /mnt/user/data/shopee-agent:/mnt/user/data/shopee-agent
      # Config editável sem rebuild
      - ./config.yaml:/app/config.yaml:ro
      - ./config/prompts:/app/config/prompts:ro
    environment:
      # Cron: executar pipeline diariamente às 08:00 (horário do container)
      CRON_SCHEDULE: "0 8 * * *"
      # Timezone (ajuste para seu fuso)
      TZ: America/Sao_Paulo
